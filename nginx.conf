# Configuración de Nginx para servir el frontend estático de Series Tracker.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión básica para los assets de texto.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Caché agresiva para assets estáticos versionados; se puede ajustar si
    # más adelante introducimos hashing en los nombres de archivo.
    location ~* \.(?:css|js|png|jpe?g|webp|svg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Cualquier otra ruta devuelve index.html (la app es de una sola vista).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
