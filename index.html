<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Games Tracker</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Games Tracker</h1>
      <p class="tagline">Tu biblioteca personal de videojuegos, en un solo lugar.</p>
    </header>

    <!-- Barra de acciones globales. -->
    <section class="toolbar">
      <button id="btn-export" class="btn btn-ghost" type="button">⬇ Exportar CSV</button>
      <button id="btn-new" class="btn btn-primary" type="button">＋ Nuevo juego</button>
    </section>

    <!-- Contenedor donde el form de creación/edición se monta dinámicamente. -->
    <section id="form-slot" class="form-slot" hidden></section>

    <main id="app">
      <!-- Estado inicial: el JS del cliente lo reemplaza al cargar los juegos. -->
      <p class="empty">Cargando juegos…</p>
    </main>

    <!-- Cargamos los módulos en orden: helpers de API, helpers de DOM, exportación y entry point. -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/csv.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
